<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 12 12">
  <defs>
    <style>
      .cls-1 {
        fill: none;
        stroke: #1a237e;
        stroke-miterlimit: 10;
        stroke-width: .5px;
      }
      .cls-2 {
        fill: #1a237e;
      }
    </style>
  </defs>
  <g>
    <g id="Layer_1">
      <!-- Outer circle -->
      <circle class="cls-1" cx="6" cy="6" r="5.6"/>

      <!-- Smooth S-curve spline -->
      <path class="cls-1" d="M3,7.5 Q4.5,4.5 6,6 T9,4.5"/>

      <!-- Control points -->
      <circle class="cls-2" cx="3" cy="7.5" r="0.3"/>
      <circle class="cls-2" cx="6" cy="6" r="0.3"/>
      <circle class="cls-2" cx="9" cy="4.5" r="0.3"/>

      <!-- Plus sign -->
      <line class="cls-1" x1="8" y1="7.5" x2="8" y2="9"/>
      <line class="cls-1" x1="7.25" y1="8.25" x2="8.75" y2="8.25"/>
    </g>
  </g>
</svg>
