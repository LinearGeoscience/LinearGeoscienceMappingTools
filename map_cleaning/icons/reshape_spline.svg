<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 12 12">
  <defs>
    <style>
      .cls-1 {
        fill: none;
        stroke: #1a237e;
        stroke-miterlimit: 10;
        stroke-width: .5px;
      }
      .cls-2 {
        fill: #1a237e;
      }
    </style>
  </defs>
  <g>
    <g id="Layer_1">
      <!-- Outer circle -->
      <circle class="cls-1" cx="6" cy="6" r="5.6"/>

      <!-- Rectangle with three straight edges -->
      <line class="cls-1" x1="3.5" y1="4" x2="3.5" y2="8"/>
      <line class="cls-1" x1="3.5" y1="4" x2="8.5" y2="4"/>
      <line class="cls-1" x1="8.5" y1="4" x2="8.5" y2="8"/>

      <!-- Curved edge (spline) - smooth wave -->
      <path class="cls-1" d="M3.5,8 Q6,9 8.5,8"/>

      <!-- Control points (small dots) -->
      <circle class="cls-2" cx="3.5" cy="8" r="0.3"/>
      <circle class="cls-2" cx="6" cy="9" r="0.3"/>
      <circle class="cls-2" cx="8.5" cy="8" r="0.3"/>
    </g>
  </g>
</svg>
