<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 12 12">
  <defs>
    <style>
      .cls-1 {
        fill: none;
        stroke: #1a237e;
        stroke-miterlimit: 10;
        stroke-width: .5px;
      }
      .cls-2 {
        fill: #1a237e;
      }
    </style>
  </defs>
  <g>
    <g id="Layer_1">
      <!-- Outer circle -->
      <circle class="cls-1" cx="6" cy="6" r="5.6"/>

      <!-- Large circle (background shape) -->
      <circle class="cls-1" cx="5" cy="6" r="2.5"/>

      <!-- Small circle overlapping (foreground shape) - represents the cutting shape -->
      <circle class="cls-1" cx="7" cy="6" r="1.5"/>

      <!-- Difference/clip symbol - showing subtraction -->
      <!-- Minus sign to indicate clipping/difference operation -->
      <line class="cls-1" x1="4" y1="3.5" x2="6" y2="3.5" stroke-width=".6"/>
    </g>
  </g>
</svg>
